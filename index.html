<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lectio</title>
<meta name="description" content="A beautiful, distraction-free Bible reader">
<meta name="theme-color" content="#1A1612" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lectio">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400;500&family=Jost:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Lexend:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root {
  --bg:#FFFFFF; --bg-sub:#F5F5F3; --text:#191919; --text-soft:#3A3530;
  --text-muted:#909090; --ghost:#D4A86A; --col-rule:#E2E2DF; --border:#E4E4E1;
  --shadow:rgba(0,0,0,.08); --accent:#191919; --hi:#B8722E;
  --serif:'EB Garamond',Georgia,serif;
  --display:'Cormorant Garamond',Georgia,serif;
  --sc:'Cormorant SC',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
  --base-size:18px; --bar-h:52px;
  --line-height:1.84; --read-width:660px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
}
[data-theme="sepia"]{--bg:#F4E9D0;--bg-sub:#EDE0C3;--text:#251505;--text-soft:#4A2E10;--text-muted:#8A7040;--ghost:#B89050;--col-rule:#D0BC96;--border:#D5C49A;--shadow:rgba(40,20,0,.1);--accent:#3D2005;--hi:#8B4A18;}
[data-theme="night"]{--bg:#1A1612;--bg-sub:#221D17;--text:#E8E0D0;--text-soft:#C8BEA8;--text-muted:#706050;--ghost:#C4843A;--col-rule:#2A2318;--border:#2E2820;--shadow:rgba(0,0,0,.4);--accent:#E8E0D0;--hi:#D4943A;}
@media(prefers-color-scheme:dark){[data-theme="auto"]{--bg:#1A1612;--bg-sub:#221D17;--text:#E8E0D0;--text-soft:#C8BEA8;--text-muted:#706050;--ghost:#C4843A;--col-rule:#2A2318;--border:#2E2820;--shadow:rgba(0,0,0,.4);--accent:#E8E0D0;--hi:#D4943A;}}
[data-size="small"]{--base-size:15px;}[data-size="medium"]{--base-size:18px;}[data-size="large"]{--base-size:22px;}
[data-lh="tight"]{--line-height:1.5;}[data-lh="normal"]{--line-height:1.84;}[data-lh="loose"]{--line-height:2.2;}
[data-rw="narrow"]{--read-width:520px;}[data-rw="normal"]{--read-width:660px;}[data-rw="wide"]{--read-width:820px;}
[data-font="garamond"]{--serif:'EB Garamond',Georgia,serif;}
[data-font="lora"]{--serif:'Lora',Georgia,serif;}
[data-font="georgia"]{--serif:Georgia,'Times New Roman',serif;}
[data-font="lexend"]{--serif:'Lexend',system-ui,sans-serif;}
[data-align="left"] .passage,[data-align="left"] .apibible-prose .apibible-content{text-align:left;hyphens:none;-webkit-hyphens:none;}
[data-parsp="compact"] .verse-line,[data-parsp="compact"] .v-span{margin-bottom:.2em;}
[data-parsp="spacious"] .verse-line,[data-parsp="spacious"] .v-span{margin-bottom:.9em;}
[data-ls="wide"] .passage,[data-ls="wide"] .verse-line,[data-ls="wide"] .v-span{letter-spacing:.03em;word-spacing:.08em;}
[data-ls="wider"] .passage,[data-ls="wider"] .verse-line,[data-ls="wider"] .v-span{letter-spacing:.07em;word-spacing:.16em;}
[data-dysfont="true"]{--serif:'Lexend',system-ui,sans-serif;}
[data-contrast="high"]{--text:#000000;--text-soft:#000000;--bg:#FFFFFF;--bg-sub:#F0F0F0;}
[data-theme="night"][data-contrast="high"]{--text:#FFFFFF;--text-soft:#FFFFFF;--bg:#000000;--bg-sub:#111111;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
html,body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:var(--base-size);line-height:var(--line-height);-webkit-font-smoothing:antialiased;font-feature-settings:"kern" 1,"liga" 1,"onum" 1;transition:background-color .5s,color .5s;}

/* ── Top bar ── */
.top-bar{position:fixed;inset:0 0 auto 0;height:calc(var(--bar-h) + var(--sat));padding-top:var(--sat);background:var(--bg);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding-left:max(16px,var(--sal));padding-right:max(16px,var(--sar));z-index:50;transition:background-color .5s,border-color .5s;}
@media(display-mode:standalone){.top-bar{border-bottom:none;}}
.top-left{display:flex;align-items:center;justify-content:flex-start;min-width:0;}
.top-mid{display:flex;align-items:center;justify-content:center;}
.top-right{display:flex;align-items:center;justify-content:flex-end;gap:4px;}
.top-wordmark{font-family:var(--display);font-weight:400;font-style:italic;font-size:1.15rem;letter-spacing:.04em;color:var(--hi);user-select:none;}
.top-wordmark-right{display:none;}
.top-ref{display:flex;align-items:center;gap:5px;cursor:pointer;padding:6px 12px 6px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg-sub);transition:border-color .2s;user-select:none;min-width:0;max-width:100%;}
.top-ref:hover{border-color:var(--text-muted);}
.top-book{font-family:var(--sc);font-weight:500;font-size:.82rem;letter-spacing:.2em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-sep{font-family:var(--sans);font-size:.62rem;color:var(--border);font-weight:300;flex-shrink:0;}
.top-ch{font-family:var(--sc);font-weight:400;font-size:.82rem;letter-spacing:.16em;color:var(--text-soft);flex-shrink:0;}
.top-hint{font-family:var(--sans);font-size:.6rem;font-weight:300;color:var(--text-muted);opacity:.7;flex-shrink:0;}
.icon-btn{width:36px;height:36px;background:transparent;border:1px solid transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .2s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--border);color:var(--text);}
.icon-btn svg{width:15px;height:15px;}
.icon-btn.active{color:var(--hi);border-color:var(--hi);}

/* ── Page & reading ── */
.page{padding-top:calc(var(--bar-h) + var(--sat));padding-bottom:96px;min-height:100vh;}
.reading-surface{max-width:var(--read-width);margin:0 auto;padding:0 28px;transition:opacity .3s;}
.reading-surface.loading{opacity:.2;pointer-events:none;}
.reading-surface.compare-grid{max-width:1600px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:0;}
.compare-col{padding:0 28px;border-right:1px solid var(--col-rule);}
.compare-col:last-child{border-right:none;}

/* ── Chapter header ── */
.chapter-meta{text-align:center;padding:64px 0 52px;}
.meta-book{display:block;font-family:var(--sc);font-weight:400;font-size:.72rem;letter-spacing:.48em;color:var(--text-soft);margin-bottom:6px;}
.meta-numeral{display:block;font-family:var(--display);font-weight:300;font-size:clamp(5rem,18vw,11rem);line-height:.9;color:var(--ghost);opacity:.35;letter-spacing:-.02em;user-select:none;margin-bottom:28px;}
.meta-rule{width:28px;height:1px;background:var(--col-rule);margin:0 auto;}
.col-header{display:flex;justify-content:space-between;align-items:baseline;padding:40px 0 24px;margin-bottom:4px;border-bottom:1px solid var(--col-rule);}
.col-ref{font-family:var(--sc);font-weight:400;font-size:.72rem;letter-spacing:.32em;color:var(--text-soft);}
.col-name{font-family:var(--sans);font-size:.62rem;font-weight:300;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;}

/* ── Verse typography ── */
.passage{text-align:justify;hyphens:auto;-webkit-hyphens:auto;}
.verse-line{position:relative;margin-bottom:.55em;border-radius:3px;cursor:pointer;transition:background .15s;padding:1px 4px 1px 2px;}
.v-span{display:inline;cursor:pointer;}
.verse-num{font-family:var(--sans);font-size:.62em;font-weight:700;color:var(--hi);opacity:.7;vertical-align:super;line-height:0;margin-right:.25em;margin-left:.1em;letter-spacing:0;transition:opacity .15s;}
.drop-cap::first-letter{font-family:var(--display);font-weight:400;font-size:4em;line-height:.82;float:left;padding-right:.06em;padding-top:.08em;color:var(--text-soft);}
.hide-verse-nums .verse-num,.hide-verse-nums [data-number]{display:none;}

/* ── Verse selection ── */
.verse-line.v-selected,.v-span.v-selected{text-decoration:underline;text-decoration-color:var(--hi);text-underline-offset:3px;text-decoration-thickness:2px;}
.verse-line[data-highlight="yellow"]{background:rgba(255,220,50,.28);}
.verse-line[data-highlight="green"]{background:rgba(80,180,80,.22);}
.verse-line[data-highlight="blue"]{background:rgba(60,140,240,.2);}
.verse-line[data-highlight="pink"]{background:rgba(230,80,120,.2);}
.verse-line[data-highlight="purple"]{background:rgba(150,80,200,.18);}
.v-span[data-highlight="yellow"]{background:rgba(255,220,50,.28);border-radius:2px;}
.v-span[data-highlight="green"]{background:rgba(80,180,80,.22);border-radius:2px;}
.v-span[data-highlight="blue"]{background:rgba(60,140,240,.2);border-radius:2px;}
.v-span[data-highlight="pink"]{background:rgba(230,80,120,.2);border-radius:2px;}
.v-span[data-highlight="purple"]{background:rgba(150,80,200,.18);border-radius:2px;}
/* Bookmarked verse — subtle left accent */
.verse-line[data-bookmarked="true"]::before{content:'';position:absolute;left:-8px;top:2px;bottom:2px;width:3px;background:var(--hi);border-radius:2px;opacity:.7;}

/* ── Verse action bar ── */
.verse-action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px solid var(--hi);padding:10px max(16px,var(--sal)) max(10px,var(--sab)) max(16px,var(--sal));display:flex;align-items:center;gap:10px;transform:translateY(calc(100% + 20px));transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:55;box-shadow:0 -4px 20px var(--shadow);flex-wrap:wrap;}
.verse-action-bar.open{transform:translateY(0);}
.vab-label{font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:.1em;color:var(--text-muted);flex-shrink:0;min-width:80px;}
.vab-colours{display:flex;gap:6px;align-items:center;}
.vab-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.vab-swatch:hover{transform:scale(1.2);border-color:var(--text-muted);}
.vab-swatch[data-c="none"]{background:transparent;border:1px dashed var(--text-muted);position:relative;}
.vab-swatch[data-c="none"]::after{content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--text-muted);}
.vab-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.vab-btn{background:none;border:none;cursor:pointer;color:var(--text-soft);padding:6px;border-radius:4px;display:flex;align-items:center;gap:5px;font-family:var(--sans);font-size:.7rem;font-weight:300;letter-spacing:.08em;transition:color .15s,background .15s;min-height:36px;}
.vab-btn:hover{color:var(--text);background:var(--bg-sub);}
.vab-btn svg{width:16px;height:16px;}
.vab-clear{margin-left:auto;color:var(--text-muted);}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:.1em;padding:9px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:350;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── API.Bible HTML ── */
.apibible-content [data-number]{font-family:var(--sans);font-size:.62em;font-weight:700;color:var(--hi);opacity:.7;vertical-align:super;line-height:0;margin-right:.25em;margin-left:.1em;letter-spacing:0;}
.apibible-content .q1{display:block;padding-left:1.4em;text-align:left;}
.apibible-content .q2{display:block;padding-left:2.8em;text-align:left;}
.apibible-content .s1,.apibible-content .s2,.apibible-content .ms,.apibible-content .mr,.apibible-content .d{display:none;}
.apibible-content .nd{font-variant:small-caps;}.apibible-content .add{font-style:italic;}
.apibible-prose .apibible-content p,.apibible-prose .apibible-content .q1,.apibible-prose .apibible-content .q2{display:inline;padding-left:0;}
.apibible-prose .apibible-content p::after{content:' ';}
.apibible-prose .apibible-content{display:block;text-align:justify;}
.apibible-drop .apibible-content>p:first-child::first-letter{font-family:var(--display);font-weight:400;font-size:4em;line-height:.82;float:left;padding-right:.06em;padding-top:.08em;color:var(--text-soft);}
.copyright{display:none;}

/* ── Page nav ── */
.page-nav{max-width:var(--read-width);margin:64px auto 0;padding:24px 28px;border-top:1px solid var(--border);display:none;justify-content:space-between;align-items:center;}
.reading-surface.compare-grid~.page-nav{max-width:1600px;}
.nav-btn{background:none;border:none;font-family:var(--sans);font-size:.7rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;padding:10px 0;transition:color .2s;min-width:44px;min-height:44px;display:flex;align-items:center;}
.nav-btn:hover{color:var(--text);}.nav-btn:disabled{opacity:.25;cursor:default;}
.status-msg{text-align:center;font-family:var(--display);font-style:italic;font-weight:300;color:var(--text-muted);padding:72px 0;font-size:1.2rem;}

/* ── Settings panel ── */
.settings-panel{position:fixed;inset:0 0 0 auto;width:300px;max-width:92vw;background:var(--bg-sub);border-left:1px solid var(--border);padding:0 0 calc(48px + var(--sab));overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1),background-color .5s;z-index:60;box-shadow:-8px 0 32px var(--shadow);}
.settings-panel.open{transform:translateX(0);}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 13px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-sub);z-index:1;transition:background-color .5s;}
.settings-header h2{font-family:var(--sans);font-weight:300;font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);margin:0;}
.settings-close{background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text-soft);cursor:pointer;font-family:var(--sans);font-size:.64rem;font-weight:400;letter-spacing:.16em;text-transform:uppercase;padding:6px 12px;transition:all .2s;display:flex;align-items:center;gap:5px;}
.settings-close:hover{border-color:var(--text-muted);color:var(--text);}
.settings-close svg{width:11px;height:11px;}
.settings-body{padding:20px 20px 0;}
.s-sec{margin-bottom:24px;}
.s-sec h3{font-family:var(--sans);font-weight:400;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.s-field{display:flex;justify-content:space-between;align-items:center;padding:8px 0;min-height:44px;}
.s-field label{font-family:var(--sans);font-size:.82rem;font-weight:300;color:var(--text-soft);cursor:pointer;flex:1;}
.s-note{font-family:var(--sans);font-size:.7rem;font-weight:300;color:var(--text-muted);margin-top:4px;line-height:1.5;}

/* Toggle */
.toggle{position:relative;width:36px;height:20px;background:var(--border);border-radius:10px;border:none;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle.on{background:var(--hi);}
.toggle.on::after{transform:translateX(16px);}
[data-theme="night"] .toggle::after,[data-theme="auto"] .toggle::after{background:#1A1612;}

/* Styled select */
.styled-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:9px 30px 9px 10px;font-family:var(--sans);font-size:.8rem;font-weight:300;color:var(--text);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='1.5'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 8px center;background-size:13px;}
.styled-select:focus{outline:none;border-color:var(--text-muted);}

/* Segmented */
.segmented{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;background:var(--bg);}
.segmented button{flex:1;background:transparent;border:none;padding:9px 4px;font-family:var(--sans);font-size:.62rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all .2s;min-height:40px;}
.segmented button.active{background:var(--hi);color:#fff;}

/* Open-section button */
.open-sec-btn{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 14px;font-family:var(--sans);font-size:.8rem;font-weight:300;color:var(--text-soft);cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;min-height:44px;}
.open-sec-btn:hover{border-color:var(--text-muted);}
.open-sec-badge{font-family:var(--sc);font-size:.6rem;letter-spacing:.12em;color:var(--text-muted);}

/* Comparison chips */
.comp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:28px;}
.comp-chip{display:flex;align-items:center;gap:5px;background:var(--hi);color:#fff;border-radius:3px;padding:4px 8px;font-family:var(--sans);font-size:.68rem;font-weight:400;}
.chip-x{background:none;border:none;color:inherit;cursor:pointer;padding:0 0 0 2px;line-height:1;opacity:.7;font-size:1rem;}
.chip-x:hover{opacity:1;}
.comp-empty{font-family:var(--sans);font-size:.76rem;font-weight:300;color:var(--text-muted);padding:2px 0;}
.comp-typeahead{position:relative;}
.comp-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:9px 10px;font-family:var(--sans);font-size:.82rem;font-weight:300;color:var(--text);outline:none;transition:border-color .2s;}
.comp-input:focus{border-color:var(--text-muted);}
.comp-input::placeholder{color:var(--text-muted);}
.comp-dropdown{position:fixed;background:var(--bg);border:1px solid var(--border);border-radius:3px;box-shadow:0 8px 24px var(--shadow);max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:200;display:none;}
.comp-dropdown.open{display:block;}
.comp-opt{padding:10px 12px;font-family:var(--sans);font-size:.8rem;font-weight:300;color:var(--text-soft);cursor:pointer;transition:background .12s;display:flex;justify-content:space-between;align-items:center;min-height:44px;}
.comp-opt:hover{background:var(--bg-sub);}
.comp-opt.added{opacity:.35;pointer-events:none;}
.comp-opt-abbr{font-family:var(--sc);font-size:.6rem;color:var(--text-muted);letter-spacing:.12em;}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:32px 28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;box-shadow:0 24px 64px rgba(0,0,0,.18);transition:background-color .5s;}
.modal-card.wide{max-width:580px;}
@media(max-width:520px){.modal-card{padding:24px 18px;}}
.modal-title{font-family:var(--sans);font-weight:300;font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:var(--sans);font-size:.7rem;font-weight:300;letter-spacing:.1em;padding:4px;transition:color .2s;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:flex-end;}
.modal-close:hover{color:var(--text);}
.modal-sec{margin-bottom:28px;}
.modal-sec:last-child{margin-bottom:0;}
.modal-sec h3{font-family:var(--sans);font-weight:500;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-soft);margin-bottom:8px;}
.modal-note{font-family:var(--sans);font-size:.78rem;font-weight:300;color:var(--text-muted);line-height:1.65;margin-bottom:12px;}

/* Keys */
.key-wrap{position:relative;margin-bottom:6px;}
.key-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:10px 50px 10px 12px;font-family:var(--sans);font-size:.82rem;font-weight:300;color:var(--text);outline:none;transition:border-color .2s;}
.key-input:focus{border-color:var(--text-muted);}
.key-input::placeholder{color:var(--text-muted);}
.key-save{position:absolute;right:0;top:0;bottom:0;background:var(--hi);border:none;border-radius:0 3px 3px 0;padding:0 14px;font-family:var(--sans);font-size:.62rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .2s;}
.key-save:hover{opacity:.8;}
.key-status{font-family:var(--sans);font-size:.7rem;font-weight:300;color:var(--text-muted);min-height:18px;}
.key-status.ok{color:#4E8044;}.key-status.err{color:#964040;}
.key-link{display:inline-block;margin-top:8px;font-family:var(--sans);font-size:.7rem;font-weight:300;color:var(--text-muted);text-decoration:none;transition:color .2s;}
.key-link:hover{color:var(--text);}
.key-divider{border:none;border-top:1px solid var(--border);margin:24px 0;}

/* ── Search overlay ── */
.search-overlay{position:fixed;inset:0;z-index:90;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;flex-direction:column;}
.search-overlay.open{opacity:1;pointer-events:auto;}
.search-bar{padding:calc(16px + var(--sat)) 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.search-input-wrap{position:relative;flex:1;}
.search-input{width:100%;background:var(--bg-sub);border:1px solid var(--border);border-radius:4px;padding:11px 16px 11px 40px;font-family:var(--serif);font-size:1rem;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-icon-inner{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
.search-icon-inner svg{width:15px;height:15px;}
.search-close-btn{background:none;border:none;font-family:var(--sans);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;padding:10px;min-height:44px;}
.search-close-btn:hover{color:var(--text);}
.search-hint{font-family:var(--sans);font-size:.72rem;font-weight:300;color:var(--text-muted);padding:8px 20px 0;}
.search-results{flex:1;overflow-y:auto;padding:8px 16px 40px;}
.sr-item{padding:14px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:3px;transition:background .12s;}
.sr-item:hover{background:var(--bg-sub);}
.sr-item:last-child{border-bottom:none;}
.sr-ref{font-family:var(--sc);font-size:.66rem;letter-spacing:.2em;color:var(--hi);margin-bottom:4px;}
.sr-text{font-family:var(--serif);font-size:.95rem;color:var(--text-soft);line-height:1.55;}
.sr-empty{text-align:center;font-family:var(--display);font-style:italic;color:var(--text-muted);padding:48px 20px;font-size:1.1rem;}

/* ── Bookmarks modal ── */
.bk-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.bk-item:hover .bk-ref{color:var(--hi);}
.bk-item:last-child{border-bottom:none;}
.bk-info{flex:1;min-width:0;}
.bk-ref{font-family:var(--sc);font-size:.66rem;letter-spacing:.2em;color:var(--text-muted);margin-bottom:4px;transition:color .15s;}
.bk-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--hi);margin-right:6px;opacity:.7;}
.bk-text{font-family:var(--serif);font-size:.92rem;color:var(--text-soft);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.bk-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;opacity:.5;padding:4px;flex-shrink:0;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.bk-del:hover{opacity:1;}
.bk-empty{text-align:center;font-family:var(--display);font-style:italic;color:var(--text-muted);padding:36px 0;font-size:1.05rem;}

/* ── Reading plan ── */
.plan-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);}
.plan-tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px 10px;font-family:var(--sans);font-size:.7rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all .2s;margin-bottom:-1px;}
.plan-tab.active{color:var(--text);border-bottom-color:var(--hi);}
.plan-day{font-family:var(--sans);font-size:.66rem;font-weight:300;color:var(--text-muted);letter-spacing:.08em;margin-bottom:12px;}
.plan-passage{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-sub);border-radius:3px;margin-bottom:8px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.plan-passage:hover{border-color:var(--border);background:var(--bg);}
.plan-passage-ref{font-family:var(--display);font-style:italic;font-weight:400;font-size:1.05rem;color:var(--text-soft);}
.plan-passage-go{font-family:var(--sans);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
.plan-progress{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.plan-progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;}
.plan-progress-fill{height:100%;background:var(--hi);border-radius:2px;transition:width .5s ease;}
.plan-progress-label{font-family:var(--sans);font-size:.68rem;font-weight:300;color:var(--text-muted);}

/* ── App info modal ── */
.appinfo-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-family:var(--sans);font-size:.8rem;font-weight:300;color:var(--text-soft);}
.appinfo-row:last-child{border-bottom:none;}
.appinfo-val{color:var(--text-muted);font-size:.75rem;}
.appinfo-cr{font-family:var(--sans);font-size:.72rem;font-weight:300;color:var(--text-muted);line-height:1.7;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* ── Selector ── */
.selector-overlay{position:fixed;inset:0;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .28s;z-index:80;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:calc(60px + var(--sat)) max(20px,var(--sar)) calc(40px + var(--sab)) max(20px,var(--sal));}
.selector-overlay.open{opacity:1;pointer-events:auto;}
.selector-inner{max-width:740px;margin:0 auto;}
.sel-close{position:fixed;top:calc(14px + var(--sat));right:max(16px,var(--sar));z-index:85;}

.sel-nav{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:24px;background:var(--bg-sub);max-width:320px;margin-left:auto;margin-right:auto;}
.sel-nav button{flex:1;background:transparent;border:none;padding:10px;font-family:var(--sans);font-size:.66rem;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.sel-nav button.active{background:var(--bg);color:var(--hi);font-weight:500;}

.sel-view{display:none;animation:fadeIn .2s ease;margin-bottom:40px;}
.sel-view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.ot-nt-split{font-family:var(--sans);font-weight:400;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--col-rule);grid-column:1 / -1;}
.ot-nt-split:first-child{margin-top:0;}

.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,100px),1fr));gap:6px;}
.book-btn{background:var(--bg-sub);border:1px solid transparent;border-radius:3px;padding:12px 6px;font-family:var(--sans);font-size:.76rem;font-weight:300;color:var(--text-soft);cursor:pointer;text-align:center;transition:all .15s;min-height:44px;display:flex;align-items:center;justify-content:center;}
.book-btn:hover{background:var(--bg);border-color:var(--text-muted);color:var(--text);}
.book-btn.selected{background:var(--hi);color:#fff;font-weight:400;}

.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,52px),1fr));gap:6px;}
.ch-btn{background:var(--bg-sub);border:1px solid transparent;border-radius:3px;padding:12px 4px;font-family:var(--sans);font-size:.85rem;font-weight:300;color:var(--text-soft);cursor:pointer;text-align:center;transition:all .15s;min-height:44px;}
.ch-btn:hover{background:var(--bg);border-color:var(--text-muted);color:var(--text);}

/* ── App container layout ── */
.bottom-tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(48px + var(--sab));padding-bottom:var(--sab);background:var(--bg);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);z-index:70;transition:background-color .5s,border-color .5s;}
@media(display-mode:standalone){.bottom-tab-bar{border-top:none;box-shadow:0 -1px 0 var(--border);}}
.tab-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);cursor:pointer;transition:color .2s;min-height:48px;padding-top:2px;}
.tab-btn:hover{color:var(--text-soft);}
.tab-btn.active{color:var(--hi);}
.tab-btn svg{width:18px;height:18px;margin-bottom:3px;stroke-width:1.75;}
.tab-btn span{font-family:var(--sans);font-size:.58rem;font-weight:400;letter-spacing:.04em;}
</style>
</head>
