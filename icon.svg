<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#191919"/>
  <!-- Decorative fine horizontal rule (Alabaster-style) -->
  <line x1="96" y1="390" x2="416" y2="390" stroke="#333" stroke-width="1.5"/>
  <!-- Italic L — drawn as paths for font-independent rendering -->
  <!-- Stem -->
  <rect x="148" y="96" width="42" height="258" rx="4" fill="#FFFFFF"/>
  <!-- Foot / serif -->
  <rect x="148" y="330" width="188" height="42" rx="4" fill="#FFFFFF"/>
  <!-- Optional thin italic slant line top-right of stem for italic feel -->
  <polygon points="148,96 190,96 176,116 148,116" fill="#FFFFFF"/>
</svg>
